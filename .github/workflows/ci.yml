name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tooling
        run: echo "build install tools" && sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck age lychee git-filter-repo && curl -sLo /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 && chmod +x /tmp/sops && sudo mv /tmp/sops /usr/local/bin/sops && curl -sLo /tmp/gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.23.0/gitleaks_8.23.0_linux_x64.tar.gz && tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks && sudo mv /tmp/gitleaks /usr/local/bin/gitleaks && echo "build complete"

      - name: Test — shellcheck
        run: shellcheck --severity=warning scripts/*.sh scripts/checks/*.sh && echo "test shellcheck"

      - name: Test — gitleaks secrets scan
        run: gitleaks detect --source . -v 2>&1 || echo "gitleaks warnings found (non-blocking)"

      - name: Test — self-audit
        run: SELF_CONSISTENCY_ACTIVE=1 ./scripts/audit.sh --exit-code .
