name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tooling
        run: echo "build install tools" && sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck age lefthook && curl -sLo /tmp/sops https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64 && chmod +x /tmp/sops && sudo mv /tmp/sops /usr/local/bin/sops && echo "build complete"

      - name: Test — shellcheck
        run: shellcheck --severity=warning scripts/*.sh scripts/checks/*.sh && echo "test shellcheck"

      - name: Test — self-audit
        run: ./scripts/audit.sh --exit-code .
